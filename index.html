<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Mon Budget Zen</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Bangers&family=Patrick+Hand&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #b91c1c; --text: #f8fafc; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        /* FOND D'ÉCRAN - Utilisation de guillemets pour l'espace et l'accent */
        html {
            background: #000 url("maison hantée.jpg") no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
        }
        
        body { 
            font-family: 'Patrick Hand', cursive; 
            color: var(--text); 
            min-height: 100vh;
            display: flex;
            justify-content: center;
            background: rgba(0, 0, 0, 0.65);
            margin: 0;
        }

        .app-container { width: 100%; max-width: 850px; padding: 40px 15px 140px 15px; }

        .main-header-art {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .subtitle-box { font-size: clamp(28px, 8vw, 42px); color: #fff; display: block; }
        .main-title-gothic { font-family: 'Cinzel', serif; font-size: 14px; color: var(--primary); letter-spacing: 5px; }

        /* LE BOUTON FLAMMES */
        .btn-save {
            background: #000 url("flammes.jpg") no-repeat center center !important;
            background-size: cover !important;
            color: #fff !important;
            border: 2px solid #ff4500 !important;
            padding: 15px !important;
            border-radius: 12px;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 69, 0, 0.5);
            animation: burnPulse 2s infinite;
        }

        @keyframes burnPulse {
            0% { box-shadow: 0 0 10px rgba(255, 69, 0, 0.4); }
            50% { box-shadow: 0 0 25px rgba(255, 140, 0, 0.8); }
            100% { box-shadow: 0 0 10px rgba(255, 69, 0, 0.4); }
        }

        .plume-icon { width: 25px; height: 25px; object-fit: contain; }

        /* RESTE DU STYLE */
        .solde-header { background: rgba(0,0,0,0.8); border: 1px solid var(--primary); padding: 15px; border-radius: 16px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .summary-grid { display: flex; gap: 10px; margin-bottom: 20px; }
        .summary-card { flex: 1; background: rgba(15, 23, 42, 0.5); padding: 15px; border-radius: 12px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .summary-val { font-family: 'Bangers'; font-size: 28px; }
        .cat-card { background: rgba(15, 23, 42, 0.4); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; overflow: hidden; backdrop-filter: blur(8px); }
        .cat-header { padding: 15px; font-family: 'Cinzel'; color: var(--primary); display: flex; justify-content: space-between; border-bottom: 1px solid rgba(185,28,28,0.2); }
        .item-row { display: flex; align-items: center; padding: 12px 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .item-label { flex: 1; font-size: 20px; }
        input { background: rgba(0,0,0,0.7); color: #fff; border: 1px solid #444; padding: 10px; border-radius: 8px; }
        .btn-add { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; }

        .nav-bar { position: fixed; bottom: 0; width: 100%; max-width: 850px; background: rgba(0,0,0,0.9); border-top: 2px solid var(--primary); padding: 15px; display: flex; justify-content: space-around; }
        .nav-btn { background: none; border: none; color: #666; font-family: 'Bangers'; font-size: 22px; }
        .nav-btn.active { color: var(--primary); }
        #internalSaveBox { display: none; background: #facc15; color: #000; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 4px solid #000; }
        #internalSaveBox textarea { width: 100%; height: 80px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="main-header-art">
            <span class="subtitle-box">Mon budget zen</span>
            <h1 class="main-title-gothic">SANCTUARIUM</h1>
        </div>

        <div class="solde-header">
            <span style="font-family: 'Cinzel'; font-size: 12px;">BUTIN INITIAL</span>
            <input type="number" id="soldeInit" style="width: 100px; text-align: right;" oninput="update()">
        </div>

        <div id="internalSaveBox">
            <b>TON SCEAU SACRÉ :</b><br>
            <textarea id="saveCodeArea" readonly></textarea>
            <button onclick="document.getElementById('internalSaveBox').style.display='none'" style="width:100%; margin-top:10px; padding:10px;">FERMER</button>
        </div>

        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <button class="btn-save" style="flex: 2;" onclick="showInternalSave()">
                <img src="plume.avif" class="plume-icon" alt="">
                Écris avec ton sang
            </button>
            <button onclick="importData()" style="flex: 1; background: #334155; color: white; border-radius: 12px; border: none;">📂 CHARGER</button>
        </div>

        <div class="summary-grid">
            <div class="summary-card"><small>ORACLE</small><br><div class="summary-val" id="sPrev">0€</div></div>
            <div class="summary-card"><small>RÉEL LIBRE</small><br><div class="summary-val" id="sReel" style="color: var(--primary);">0€</div></div>
        </div>

        <div id="catsGrid"></div>

        <nav class="nav-bar">
            <button class="nav-btn active">DONJON</button>
            <button class="nav-btn">REGISTRE</button>
        </nav>
    </div>

    <script>
        // Logique de calcul simple pour vérifier que ça tourne
        const KEY = 'sanct_v3';
        let store = JSON.parse(localStorage.getItem(KEY)) || {
            solde: 2500,
            cats: [{id:'m', label:'Maison', icon:'🏰', items:[]}]
        };

        function update() {
            store.solde = parseFloat(document.getElementById('soldeInit').value) || 0;
            document.getElementById('sReel').textContent = store.solde + "€";
            localStorage.setItem(KEY, JSON.stringify(store));
        }

        function render() {
            const grid = document.getElementById('catsGrid');
            grid.innerHTML = store.cats.map(cat => `
                <div class="cat-card">
                    <div class="cat-header">${cat.icon} ${cat.label}</div>
                    <div style="padding:15px; display:flex; gap:10px;">
                        <input type="text" placeholder="Nom" style="flex:2">
                        <input type="number" placeholder="€" style="flex:1">
                        <button class="btn-add">+</button>
                    </div>
                </div>
            `).join('');
        }

        function showInternalSave() {
            document.getElementById('saveCodeArea').value = btoa(JSON.stringify(store));
            document.getElementById('internalSaveBox').style.display = 'block';
        }

        document.getElementById('soldeInit').value = store.solde;
        render(); update();
    </script>
</body>
</html>
